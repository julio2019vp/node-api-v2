name: Build App1

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        default: dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: echo "build ok"

      - name: Env
        run: echo "Environment: dev"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: .